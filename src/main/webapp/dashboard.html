<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Mediation Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="dashboard-layout">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Mediation</h2>
                <span style="color: var(--secondary); font-size: 0.8rem; font-weight: 600;">PORTAL</span>
            </div>
            
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item active">Dashboard Overview</a>
                <a href="nodes.html" class="nav-item">Manage Nodes</a>
                <a href="rules.html" class="nav-item">Mediation Rules</a>
            </nav>
            
            <div style="padding: 1.5rem; border-top: 1px solid var(--border);">
                <a href="/logout" class="nav-item" style="color: var(--danger);">Logout</a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="page-header">
                <div>
                    <h1>Dashboard Overview</h1>
                    <p style="color: var(--text-muted); margin-top: 0.25rem;">Welcome back to the Mediation Portal</p>
                </div>
            </div>

            <!-- Stats or placeholder -->
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem;">
                <div style="background: var(--surface); padding: 1.5rem; border-radius: var(--radius-md); border: 1px solid var(--border);">
                    <h3 style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 0.5rem; font-weight: 500;">Total Nodes</h3>
                    <div style="font-size: 2rem; font-weight: 700;" id="totalNodes">...</div>
                </div>
                <div style="background: var(--surface); padding: 1.5rem; border-radius: var(--radius-md); border: 1px solid var(--border);">
                    <h3 style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 0.5rem; font-weight: 500;">Active Rules</h3>
                    <div style="font-size: 2rem; font-weight: 700;" id="totalRules">...</div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/app.js"></script>
    <script>
        async function loadStats() {
            const nodesRes = await fetchJSON('/api/nodes');
            if (nodesRes && nodesRes.ok) {
                document.getElementById('totalNodes').innerText = nodesRes.data.length;
            }
            
            const rulesRes = await fetchJSON('/api/rules');
            if (rulesRes && rulesRes.ok) {
                document.getElementById('totalRules').innerText = rulesRes.data.length;
            }
        }
        
        document.addEventListener('DOMContentLoaded', loadStats);
    </script>
</body>
</html>
